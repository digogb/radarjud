services:
  postgres:
    image: postgres:16-alpine
    container_name: dje-monitor-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: dje_monitor
      POSTGRES_USER: dje
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dje -d dje_monitor"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: dje-monitor-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    restart: unless-stopped
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.7
    container_name: dje-monitor-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    env_file:
      - .env
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: dje-monitor/Dockerfile
    image: dje-monitor-backend:latest
    container_name: dje-monitor-api
    entrypoint: []
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./scripts:/app/scripts
    env_file:
      - .env
    environment:
      - "DJE_MONITOR_HABILITADO=true"
      - "DJE_MONITOR_INTERVAL_MINUTES=30"
      - "DJE_MONITOR_MAX_PAGINAS=10"
      - DJE_QDRANT_URL=http://qdrant:6333
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  worker:
    build:
      context: ..
      dockerfile: dje-monitor/Dockerfile
    image: dje-monitor-backend:latest
    container_name: dje-monitor-worker
    entrypoint: []
    command: python -m dramatiq tasks --processes 1 --threads 2
    volumes:
      - ./data:/app/data
      - ./src:/app/src
    env_file:
      - .env
    environment:
      - DJE_QDRANT_URL=http://qdrant:6333
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  web:
    build:
      context: ./web
      args:
        - VITE_API_URL=
    container_name: dje-monitor-web
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./web/nginx.dev.conf:/etc/nginx/conf.d/default.conf
    restart: unless-stopped
    depends_on:
      - api

  scheduler:
    build:
      context: ..
      dockerfile: dje-monitor/Dockerfile
    image: dje-monitor-backend:latest
    container_name: dje-monitor-scheduler
    entrypoint: []
    command: sh -c "while true; do python3 -c 'import sys; sys.path.insert(0, \"/app/src\"); from tasks import agendar_verificacoes_task; agendar_verificacoes_task.send(); print(\"Sync diaria enfileirada\")'; sleep 86400; done"
    volumes:
      - ./src:/app/src
    env_file:
      - .env
    environment:
      - DJE_QDRANT_URL=http://qdrant:6333
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  qdrant_data:
